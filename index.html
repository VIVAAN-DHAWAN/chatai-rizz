<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rizz Coach 🔥</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #222;
    --accent: #ff3cac;
    --accent2: #784ba0;
    --accent3: #2b86c5;
    --text: #f0f0f0;
    --muted: #666;
    --green: #00ff87;
    --yellow: #ffe55c;
    --red: #ff4757;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 20%, rgba(255,60,172,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 50% 60% at 80% 80%, rgba(43,134,197,0.08) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    text-align: center;
    padding: 3rem 0 2.5rem;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3.5rem, 12vw, 6rem);
    letter-spacing: 0.05em;
    line-height: 0.9;
    background: linear-gradient(135deg, #ff3cac 0%, #784ba0 50%, #2b86c5 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 40px rgba(255,60,172,0.3));
    animation: pulse-glow 3s ease-in-out infinite;
  }

  @keyframes pulse-glow {
    0%, 100% { filter: drop-shadow(0 0 40px rgba(255,60,172,0.3)); }
    50% { filter: drop-shadow(0 0 60px rgba(255,60,172,0.5)); }
  }

  .tagline {
    margin-top: 0.75rem;
    color: var(--muted);
    font-size: 0.95rem;
    font-weight: 300;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* Scenario pills */
  .scenario-label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 0.75rem;
  }

  .scenarios {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }

  .scenario-pill {
    padding: 0.45rem 1rem;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: 'DM Sans', sans-serif;
  }

  .scenario-pill:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  .scenario-pill.active {
    background: linear-gradient(135deg, rgba(255,60,172,0.2), rgba(43,134,197,0.2));
    border-color: var(--accent);
    color: var(--text);
  }

  /* Input card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
    margin-bottom: 1rem;
    transition: border-color 0.2s;
  }

  .card:focus-within {
    border-color: #333;
  }

  textarea {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    line-height: 1.6;
    resize: none;
    min-height: 140px;
  }

  textarea::placeholder {
    color: var(--muted);
    font-style: italic;
  }

  .char-count {
    text-align: right;
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 0.5rem;
  }

  /* CTA Button */
  .btn {
    width: 100%;
    padding: 1rem;
    border-radius: 12px;
    border: none;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s ease;
    background: linear-gradient(135deg, #ff3cac, #784ba0, #2b86c5);
    background-size: 200% 200%;
    color: white;
    animation: gradient-shift 4s ease infinite;
    position: relative;
    overflow: hidden;
  }

  @keyframes gradient-shift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(255,60,172,0.3);
  }

  .btn:active:not(:disabled) {
    transform: translateY(0);
  }

  .btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    animation: none;
  }

  .btn-inner {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
  }

  /* Loading state */
  .spinner {
    width: 20px;
    height: 20px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .loading .spinner { display: block; }
  .loading .btn-text { display: none; }

  /* Results */
  #results {
    display: none;
    animation: slide-up 0.4s ease;
  }

  @keyframes slide-up {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Rizz score */
  .score-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
    margin-bottom: 1rem;
    text-align: center;
  }

  .score-label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 0.75rem;
  }

  .score-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 5rem;
    line-height: 1;
    background: linear-gradient(135deg, #ff3cac, #784ba0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .score-bar-wrap {
    background: var(--border);
    border-radius: 100px;
    height: 6px;
    margin: 1rem auto;
    max-width: 300px;
    overflow: hidden;
  }

  .score-bar-fill {
    height: 100%;
    border-radius: 100px;
    background: linear-gradient(90deg, #ff3cac, #784ba0, #2b86c5);
    transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1);
    width: 0%;
  }

  .roast-text {
    color: var(--muted);
    font-size: 0.9rem;
    font-style: italic;
    margin-top: 0.75rem;
    padding: 0.75rem 1rem;
    background: var(--surface2);
    border-radius: 8px;
    border-left: 3px solid var(--accent);
  }

  /* Alternative cards */
  .alts-label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin: 1.5rem 0 0.75rem;
  }

  .alt-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.25rem;
    margin-bottom: 0.75rem;
    transition: border-color 0.2s, transform 0.2s;
    cursor: pointer;
    position: relative;
  }

  .alt-card:hover {
    border-color: #333;
    transform: translateX(4px);
  }

  .alt-card.rank-1 { border-color: rgba(255,60,172,0.3); }

  .alt-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 0.75rem;
  }

  .rank-badge {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .rank-1 .rank-badge { background: linear-gradient(135deg, #ff3cac, #784ba0); }
  .rank-2 .rank-badge { background: var(--surface2); border: 1px solid var(--border); }
  .rank-3 .rank-badge { background: var(--surface2); border: 1px solid var(--border); }

  .vibe-tag {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 0.2rem 0.6rem;
    border-radius: 100px;
    font-weight: 600;
  }

  .vibe-Smooth { background: rgba(0,255,135,0.15); color: var(--green); border: 1px solid rgba(0,255,135,0.2); }
  .vibe-Bold { background: rgba(255,60,172,0.15); color: var(--accent); border: 1px solid rgba(255,60,172,0.2); }
  .vibe-Playful { background: rgba(255,229,92,0.15); color: var(--yellow); border: 1px solid rgba(255,229,92,0.2); }
  .vibe-Safe { background: rgba(43,134,197,0.15); color: var(--accent3); border: 1px solid rgba(43,134,197,0.2); }
  .vibe-Risky { background: rgba(255,71,87,0.15); color: var(--red); border: 1px solid rgba(255,71,87,0.2); }

  .confidence-bar {
    height: 2px;
    background: var(--border);
    border-radius: 100px;
    margin-left: auto;
    flex: 1;
    max-width: 80px;
    overflow: hidden;
  }

  .confidence-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    border-radius: 100px;
    transition: width 0.8s ease;
    width: 0%;
  }

  .alt-response {
    font-size: 0.95rem;
    line-height: 1.5;
    margin-bottom: 0.6rem;
    color: var(--text);
  }

  .alt-reasoning {
    font-size: 0.8rem;
    color: var(--muted);
    line-height: 1.4;
  }

  .copy-toast {
    position: absolute;
    top: 0.75rem;
    right: 0.75rem;
    font-size: 0.7rem;
    background: var(--green);
    color: #000;
    padding: 0.2rem 0.5rem;
    border-radius: 4px;
    font-weight: 600;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .copy-toast.show { opacity: 1; }

  /* Error */
  .error-card {
    background: rgba(255,71,87,0.1);
    border: 1px solid rgba(255,71,87,0.2);
    border-radius: 12px;
    padding: 1rem 1.25rem;
    color: var(--red);
    font-size: 0.9rem;
    margin-bottom: 1rem;
    display: none;
  }

  /* Footer */
  footer {
    text-align: center;
    padding: 2rem 0 1rem;
    color: var(--muted);
    font-size: 0.75rem;
  }

  footer a { color: inherit; }

  /* Score emoji */
  .score-emoji {
    font-size: 2rem;
    margin-bottom: 0.25rem;
  }

  @media (max-width: 480px) {
    .scenarios { gap: 0.4rem; }
    .scenario-pill { font-size: 0.78rem; padding: 0.4rem 0.8rem; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">RIZZ<br>COACH</div>
    <p class="tagline">AI-powered text analysis · no cap · 100% free</p>
  </header>

  <div class="scenario-label">Pick your scenario</div>
  <div class="scenarios" id="scenarios">
    <button class="scenario-pill active" data-scenario="first_text">First Text 👋</button>
    <button class="scenario-pill" data-scenario="asking_out">Asking Out 🥺</button>
    <button class="scenario-pill" data-scenario="left_on_read">Left on Read 💀</button>
    <button class="scenario-pill" data-scenario="situationship">Situationship 😮‍💨</button>
    <button class="scenario-pill" data-scenario="ghosted">Was Ghosted 👻</button>
  </div>

  <div class="card">
    <textarea id="convo-input" placeholder="Paste your convo here...&#10;&#10;e.g.&#10;Me: hey wanna hang this weekend?&#10;Them: maybe idk" maxlength="1500" oninput="updateCount()"></textarea>
    <div class="char-count"><span id="char-count">0</span> / 1500</div>
  </div>

  <div class="error-card" id="error-card"></div>

  <button class="btn" id="analyze-btn" onclick="analyze()">
    <div class="btn-inner">
      <div class="spinner"></div>
      <span class="btn-text">✨ CHECK MY RIZZ ✨</span>
    </div>
  </button>

  <div id="results">
    <div class="score-card">
      <div class="score-label">Your Rizz Score</div>
      <div class="score-emoji" id="score-emoji">🔥</div>
      <div class="score-number" id="score-number">0</div>
      <div class="score-bar-wrap">
        <div class="score-bar-fill" id="score-bar"></div>
      </div>
      <div class="roast-text" id="roast-text"></div>
    </div>

    <div class="alts-label">3 Better Responses</div>
    <div id="alts-container"></div>
  </div>

  <footer>Made for the culture 💅 · <a href="https://github.com" target="_blank">GitHub</a></footer>
</div>

<script>
let selectedScenario = 'first_text';

// Scenario pills
document.querySelectorAll('.scenario-pill').forEach(pill => {
  pill.addEventListener('click', () => {
    document.querySelectorAll('.scenario-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    selectedScenario = pill.dataset.scenario;
  });
});

function updateCount() {
  const len = document.getElementById('convo-input').value.length;
  document.getElementById('char-count').textContent = len;
}

function scoreEmoji(score) {
  if (score >= 9) return '🔥';
  if (score >= 7) return '😤';
  if (score >= 5) return '😐';
  if (score >= 3) return '💀';
  return '🪦';
}

function animateScore(target) {
  let current = 0;
  const el = document.getElementById('score-number');
  const bar = document.getElementById('score-bar');
  const step = target / 20;
  const timer = setInterval(() => {
    current = Math.min(current + step, target);
    el.textContent = current.toFixed(1);
    bar.style.width = `${(current / 10) * 100}%`;
    if (current >= target) {
      el.textContent = target;
      clearInterval(timer);
    }
  }, 40);
}

async function analyze() {
  const convo = document.getElementById('convo-input').value.trim();
  const btn = document.getElementById('analyze-btn');
  const errorCard = document.getElementById('error-card');
  const results = document.getElementById('results');

  errorCard.style.display = 'none';
  results.style.display = 'none';

  if (!convo) {
    errorCard.textContent = 'Bro paste your convo first 💀';
    errorCard.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.classList.add('loading');

  try {
    const res = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ conversation: convo, scenario: selectedScenario })
    });

    const data = await res.json();

    if (data.error) {
      throw new Error(data.error);
    }

    // Score
    document.getElementById('score-emoji').textContent = scoreEmoji(data.rizz_score);
    document.getElementById('roast-text').textContent = `"${data.roast}"`;
    results.style.display = 'block';
    animateScore(data.rizz_score);

    // Alternatives
    const altsContainer = document.getElementById('alts-container');
    altsContainer.innerHTML = '';

    data.alternatives.forEach((alt, i) => {
      const card = document.createElement('div');
      card.className = `alt-card rank-${i + 1}`;
      card.innerHTML = `
        <div class="copy-toast" id="toast-${i}">Copied!</div>
        <div class="alt-header">
          <div class="rank-badge">${i + 1}</div>
          <span class="vibe-tag vibe-${alt.vibe}">${alt.vibe}</span>
          <div class="confidence-bar">
            <div class="confidence-fill" id="conf-${i}" style="width:0%"></div>
          </div>
          <span style="font-size:0.75rem;color:var(--muted)">${Math.round(alt.confidence * 100)}%</span>
        </div>
        <div class="alt-response">${alt.response}</div>
        <div class="alt-reasoning">${alt.reasoning}</div>
      `;
      card.addEventListener('click', () => copyResponse(alt.response, i));
      altsContainer.appendChild(card);

      // Animate confidence bar
      setTimeout(() => {
        document.getElementById(`conf-${i}`).style.width = `${alt.confidence * 100}%`;
      }, 100 + i * 150);
    });

  } catch (err) {
    errorCard.textContent = `Error: ${err.message}`;
    errorCard.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
  }
}

function copyResponse(text, idx) {
  navigator.clipboard.writeText(text).then(() => {
    const toast = document.getElementById(`toast-${idx}`);
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1500);
  });
}

// Enter key submits
document.getElementById('convo-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.ctrlKey) analyze();
});
</script>
</body>
</html>
